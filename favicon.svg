<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark background -->
  <rect width="64" height="64" fill="#0a0a0a" rx="8"/>
  
  <!-- Glow effect -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Left curly bracket -->
  <path d="M 25 16 
           C 22 16, 20 18, 20 21
           L 20 27
           C 20 29, 18 30, 16 30
           C 18 30, 20 31, 20 33
           L 20 39
           C 20 42, 22 44, 25 44
           M 25 16
           C 23 16, 22 17, 22 19
           L 22 27
           C 22 30, 20 31, 18 32
           C 20 33, 22 34, 22 37
           L 22 41
           C 22 43, 23 44, 25 44" 
        fill="none" 
        stroke="#8b5cf6" 
        stroke-width="2.5" 
        stroke-linecap="round"
        filter="url(#glow)"/>
  
  <!-- Right curly bracket -->
  <path d="M 39 16 
           C 42 16, 44 18, 44 21
           L 44 27
           C 44 29, 46 30, 48 30
           C 46 30, 44 31, 44 33
           L 44 39
           C 44 42, 42 44, 39 44
           M 39 16
           C 41 16, 42 17, 42 19
           L 42 27
           C 42 30, 44 31, 46 32
           C 44 33, 42 34, 42 37
           L 42 41
           C 42 43, 41 44, 39 44" 
        fill="none" 
        stroke="#6366f1" 
        stroke-width="2.5" 
        stroke-linecap="round"
        filter="url(#glow)"/>
</svg>
